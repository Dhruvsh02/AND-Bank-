# ── CORS origin map — more reliable than server-level if+set ─────
map $http_origin $cors_origin {
    default                                          "";
    "~^http://(localhost|127\.0\.0\.1):(3000|3001|5173|4173)$" $http_origin;
}

server {
    listen 80;
    server_name localhost;

    # Use Docker's internal DNS resolver — re-resolves on every request
    # so container restarts/rebuilds never cause stale-IP 404s/502s
    resolver 127.0.0.11 valid=5s ipv6=off;

    set $auth_service        "auth-service:8001";
    set $user_service        "user-service:8002";
    set $transaction_service "transaction-service:8003";
    set $loan_service        "loan-service:8004";
    set $card_service        "card-service:8005";
    set $notification_service "notification-service:8006";
    set $admin_service       "admin-service:8007";
    set $chat_service        "chat-service:8008";

    client_max_body_size 20M;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header X-XSS-Protection        "1; mode=block" always;

    # ── Catch-all (returns 404 for unmapped paths) ────────────────
    location / {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With, X-Service-Token" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        return 404;
    }

    # ── Auth Service ──────────────────────────────────────────────
    location /api/auth/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://$auth_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Authorization     $http_authorization;
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
    }

    # ── User / Account Service ────────────────────────────────────
    location /api/users/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://$user_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    location /api/accounts/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://$user_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    # ── Transaction Service ───────────────────────────────────────
    location /api/transactions/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://$transaction_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    location /api/upi/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://$transaction_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    # ── Loan Service ──────────────────────────────────────────────
    location /api/loans/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://$loan_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    # ── Card Service ──────────────────────────────────────────────
    location /api/cards/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://$card_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    # ── Admin Service ─────────────────────────────────────────────
    location /api/admin/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://$admin_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    # ── Notification Service ──────────────────────────────────────
    location /api/notifications/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://$notification_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    # ── Chat Service ─────────────────────────────────────────────
    location /api/chat/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://$chat_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    # ── Chat WebSocket ────────────────────────────────────────────
    location /ws/chat/ {
        proxy_pass http://$chat_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Health check ──────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"api-gateway"}';
        add_header Content-Type application/json;
    }
}

