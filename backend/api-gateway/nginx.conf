# ── CORS origin map — more reliable than server-level if+set ─────
map $http_origin $cors_origin {
    default                                          "";
    "~^http://(localhost|127\.0\.0\.1):(3000|3001|5173|4173)$" $http_origin;
}

upstream auth_service        { server auth-service:8001; }
upstream user_service        { server user-service:8002; }
upstream transaction_service { server transaction-service:8003; }
upstream loan_service        { server loan-service:8004; }
upstream card_service        { server card-service:8005; }
upstream notification_service { server notification-service:8006; }
upstream admin_service       { server admin-service:8007; }
upstream chat_service        { server chat-service:8008; }

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    # --- adding SSL ----
    listen 443 ssl;
    ssl_certificate     /etc/ssl/andbank.crt;
    ssl_certificate_key /etc/ssl/andbank.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- redirects HTTP to HTTPS ---
    listen 80;
    return 301 https://$host$request_uri;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header X-XSS-Protection        "1; mode=block" always;

    # ── Catch-all (returns 404 for unmapped paths) ────────────────
    location / {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With, X-Service-Token" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        return 404;
    }

    # ── Auth Service ──────────────────────────────────────────────
    location /api/auth/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://auth_service;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Authorization     $http_authorization;
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
    }

    # ── User / Account Service ────────────────────────────────────
    location /api/users/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://user_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    location /api/accounts/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://user_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    # ── Transaction Service ───────────────────────────────────────
    location /api/transactions/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://transaction_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    location /api/upi/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://transaction_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    # ── Loan Service ──────────────────────────────────────────────
    location /api/loans/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://loan_service;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    # ── Card Service ──────────────────────────────────────────────
    location /api/cards/ {
        add_header "Access-Control-Allow-Origin"      $cors_origin always;
        add_header "Access-Control-Allow-Credentials" "true"       always;
        add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Requested-With" always;
        add_header "Access-Control-Max-Age"           "86400"      always;
        if ($request_method = OPTIONS) { return 204; }
