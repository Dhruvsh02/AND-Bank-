name: AND Bank — CD Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/andbank

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - { name: auth-service,         path: backend/services/auth-service }
          - { name: user-service,         path: backend/services/user-service }
          - { name: transaction-service,  path: backend/services/transaction-service }
          - { name: loan-service,         path: backend/services/loan-service }
          - { name: card-service,         path: backend/services/card-service }
          - { name: notification-service, path: backend/services/notification-service }
          - { name: admin-service,        path: backend/services/admin-service }
          - { name: chat-service,         path: backend/services/chat-service }
          - { name: frontend,             path: frontend }

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYY.MM.DD'}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key:      ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            cd /opt/andbank
            git pull origin main
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker-compose exec -T auth-service   python manage.py migrate --noinput
            docker-compose exec -T user-service   python manage.py migrate --noinput
            docker-compose exec -T transaction-service python manage.py migrate --noinput
            docker-compose exec -T loan-service   python manage.py migrate --noinput
            docker-compose exec -T card-service   python manage.py migrate --noinput
            docker-compose exec -T admin-service  python manage.py migrate --noinput
            docker-compose exec -T chat-service   python manage.py migrate --noinput
            docker system prune -f
            echo "✅ AND Bank deployed successfully at $(date)"

      - name: Notify on success
        if: success()
        run: echo "Production deployment successful!"

      - name: Notify on failure
        if: failure()
        run: echo "Production deployment FAILED!"
